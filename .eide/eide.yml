version: "4.1"
name: MSPM0G3507_Template
type: ARM
deviceName: null
packDir: null
srcDirs:
  - Application
  - BSP
  - User
  - ti
  - FreeRTOS
virtualFolder:
  name: <virtual_root>
  files: []
  folders:
    - name: Startup
      files:
        - path: startup_mspm0g350x_gcc.c
      folders: []
dependenceList: []
outDir: build
miscInfo:
  uid: d4952b94ac87fbc40843e47ad4b51f85
targets:
  Debug:
    cppPreprocessAttrs:
      defineList:
        - __MSPM0G3507__
        - SYSCFG_ENABLE_DEBUG
      incList:
        - ti/CMSIS/Core/Include
        - ti/driverlib
        - ti/driverlib/m0p
        - ti/driverlib/m0p/sysctl
        - ti/devices
        - ti/devices/msp
        - ti/devices/msp/m0p
        - ti/devices/msp/peripherals
        - ti/devices/msp/peripherals/m0p
        - ti/devices/msp/peripherals/m0p/sysctl
        - User
        - BSP/Inc
        - Application/Inc
        - .
        - FreeRTOS
        - FreeRTOS/include
        - FreeRTOS/portable
        - FreeRTOS/portable/MemMang
        - FreeRTOS/portable/GCC/ARM_CM0
      libList: []
    excludeList: []
    settings:
      debugger: cortex-debug
    toolchain: GCC
    toolchainConfigMap:
      GCC:
        archExtensions: ""
        cpuType: Cortex-M0+
        floatingPointHardware: none
        options:
          version: 5
          afterBuildTasks: []
          asm-compiler:
            ASM_FLAGS: ""
          beforeBuildTasks: []
          c/cpp-compiler:
            CXX_FLAGS: ""
            C_FLAGS: ""
            language-c: c11
            language-cpp: c++11
            one-elf-section-per-data: true
            one-elf-section-per-function: true
            optimization: level-debug
            warnings: all-warnings
          global:
            $float-abi-type: hard
            misc-control: ""
            not-use-syscalls: true
            output-debug-info: enable
            use-newlib-nano: true
          linker:
            $outputTaskExcludes:
              - .bin
            LD_FLAGS: ""
            LIB_FLAGS: -lm
            output-format: elf
            remove-unused-input-sections: true
        scatterFilePath: mspm0g3507.lds
        storageLayout:
          RAM: []
          ROM: []
        useCustomScatterFile: true
    uploadConfigMap:
      JLink:
        baseAddr: ""
        bin: ""
        cpuInfo:
          cpuName: "null"
          vendor: "null"
        otherCmds: ""
        proType: 1
        speed: 8000
      OpenOCD:
        baseAddr: "0x08000000"
        bin: ""
        interface: stlink
        target: stm32f1x
    uploader: OpenOCD
